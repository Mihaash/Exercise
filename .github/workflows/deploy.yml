name: Build Test Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run Unit Tests
        run: mvn clean test

      - name: Build Application
        run: mvn clean package

      - name: Update RESULT.md
        run: |
          echo "| $(date -u '+%Y-%m-%d %H:%M:%S UTC') | PASS |" >> RESULT.md

      - name: Commit RESULT.md
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add RESULT.md
          git commit -m "Update deployment history" || true

      - name: Push RESULT.md
        run: git push

      - name: Upload JAR To EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu"

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_IP }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Stopping any process on port 8000..."
            fuser -k 8000/tcp || true

            echo "Searching for JAR..."
            # Look for the specific JAR we just built
            JAR=$(find /home/ubuntu -name "calculator-project-1.0-SNAPSHOT.jar" | head -1)

            echo "Found JAR: $JAR"

            if [ -z "$JAR" ]; then
              echo "JAR file not found"
              exit 1
            fi

            echo "Starting application..."
            nohup java -jar "$JAR" \
              --server.port=8000 \
              > /home/ubuntu/app.log 2>&1 < /dev/null &

            echo "Waiting for application to start..."
            sleep 15

            echo "Application Log Snapshot:"
            tail -n 50 /home/ubuntu/app.log || true

            echo "Port Check (8000):"
            if ss -tulpn | grep -q ":8000 "; then
              echo "Application is running on port 8000"
            else
              echo "ERROR: Application is NOT running on port 8000"
              exit 1
            fi
